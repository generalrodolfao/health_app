services:
  postgres:
    image: postgres:16-alpine
    container_name: healthapp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp123
      POSTGRES_DB: healthapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: healthapp-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://healthapp:healthapp123@postgres:5432/healthapp?schema=public
      JWT_SECRET: dev-secret-do-not-use-in-production
      JWT_EXPIRATION: 7d
      PORT: 3333
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && npm run start:dev"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    container_name: healthapp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
    depends_on:
      - backend

volumes:
  postgres_data: